name: Bot 24/7 UNLIMITED LIMITS - MULTI BOT

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Restore Backup dari Workflow Sebelumnya
        uses: actions/download-artifact@v4
        with:
          pattern: bot-backup-*
          path: /tmp/restore_backup
          merge-multiple: true
        continue-on-error: true

      - name: Extract dan Restore SEMUA Data
        run: |
          echo "=== RESTORE SEMUA DATA ==="
          
          if [ -d "/tmp/restore_backup" ] && [ "$(ls -A /tmp/restore_backup)" ]; then
            echo "✅ Backup ditemukan, merestore SEMUA data..."
            
            # Extract semua zip
            find /tmp/restore_backup -name "*.zip" -type f 2>/dev/null | while read zipfile; do
              unzip -o "$zipfile" -d /tmp/restore_backup/ 2>/dev/null || true
            done
            
            # Extract tar
            find /tmp/restore_backup -name "*.tar.gz" -type f 2>/dev/null | while read tarfile; do
              tar -xzf "$tarfile" -C /tmp/restore_backup/ 2>/dev/null || true
            done
            
            # 1. Restore SEMUA folder bot
            for bot_dir in /tmp/restore_backup/bot_*/; do
              if [ -d "$bot_dir" ]; then
                BOT_NAME=$(basename "$bot_dir")
                echo "📂 Restoring bot: $BOT_NAME"
                mkdir -p "$BOT_NAME"
                cp -r "$bot_dir"/* "$BOT_NAME"/ 2>/dev/null || true
              fi
            done
            
            # 2. Restore SEMUA folder (termasuk folder custom)
            for folder in /tmp/restore_backup/*/; do
              if [ -d "$folder" ]; then
                FOLDER_NAME=$(basename "$folder")
                if [[ "$FOLDER_NAME" != "bot_"* ]] && [[ "$FOLDER_NAME" != "backup_"* ]] && [[ "$FOLDER_NAME" != "."* ]]; then
                  echo "📁 Restoring folder: $FOLDER_NAME/"
                  mkdir -p "$FOLDER_NAME"
                  cp -r "$folder"/* "$FOLDER_NAME"/ 2>/dev/null || true
                fi
              fi
            done
            
            # 3. Restore SEMUA file di root
            echo "📄 Restoring files in root directory..."
            for file in /tmp/restore_backup/*; do
              if [ -f "$file" ]; then
                FILENAME=$(basename "$file")
                if [[ "$FILENAME" != "backup_"* ]] && [[ "$FILENAME" != "."* ]]; then
                  echo "  ✅ $FILENAME"
                  cp "$file" "./" 2>/dev/null || true
                fi
              fi
            done
            
            # 4. Restore file JSON
            echo "📄 Restoring JSON files..."
            for json_file in /tmp/restore_backup/*.json; do
              if [ -f "$json_file" ]; then
                cp "$json_file" "./" 2>/dev/null || true
                echo "  ✅ $(basename "$json_file")"
              fi
            done
            
            # 5. Restore database files
            echo "🗄️ Restoring database files..."
            for db_file in /tmp/restore_backup/*.db /tmp/restore_backup/*.sqlite /tmp/restore_backup/*.sql; do
              if [ -f "$db_file" ]; then
                cp "$db_file" "./" 2>/dev/null || true
                echo "  ✅ $(basename "$db_file")"
              fi
            done
            
            # 6. Restore config files
            echo "⚙️ Restoring config files..."
            for config_file in /tmp/restore_backup/*.env /tmp/restore_backup/*.config /tmp/restore_backup/*.yml /tmp/restore_backup/*.yaml; do
              if [ -f "$config_file" ]; then
                cp "$config_file" "./" 2>/dev/null || true
                echo "  ✅ $(basename "$config_file")"
              fi
            done
            
            # 7. Restore fake-device.js
            if [ -f "/tmp/restore_backup/fake-device.js" ]; then
              cp "/tmp/restore_backup/fake-device.js" ./
              echo "  ✅ fake-device.js"
            fi
            
            echo "✅ RESTORE SEMUA DATA SELESAI"
          else
            echo "ℹ️ Tidak ada backup sebelumnya, memulai fresh"
          fi
          
          echo ""
          echo "=== ISI DIREKTORI SETELAH RESTORE ==="
          ls -la
          
      - name: Unzip ALL Files
        run: |
          for zipfile in *.zip; do
            if [ -f "$zipfile" ]; then
              folder_name="${zipfile%.zip}"
              echo "Extracting $zipfile to $folder_name/"
              mkdir -p "$folder_name"
              unzip -o "$zipfile" -d "$folder_name"
              rm -f "$zipfile"
            fi
          done 2>/dev/null || true
          
          echo ""
          echo "=== All bots extracted ==="
          ls -la */
          
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install ALL Dependencies
        run: |
          echo "=== Installing dependencies ==="
          npm install -g pm2
          
          for bot_dir in */; do
            if [ -f "${bot_dir}package.json" ]; then
              echo ">>> Found package.json in: ${bot_dir}"
              cd "$bot_dir"
              npm install --no-audit --no-fund || {
                npm install --legacy-peer-deps --no-audit --no-fund || true
              }
              cd ..
            elif [ -f "${bot_dir}index.js" ] || [ -f "${bot_dir}app.js" ] || [ -f "${bot_dir}main.js" ]; then
              echo ">>> No package.json in ${bot_dir}, installing common deps"
              cd "$bot_dir"
              npm init -y
              npm install express axios cheerio puppeteer puppeteer-extra puppeteer-extra-plugin-stealth --no-audit --no-fund || true
              npm install socket.io ws discord.js telegraf node-fetch --no-audit --no-fund || true
              npm install request got superagent --no-audit --no-fund || true
              npm install moment chalk colors figlet --no-audit --no-fund || true
              npm install dotenv config winston --no-audit --no-fund || true
              npm install fs-extra path os child_process --no-audit --no-fund || true
              npm install crypto crypto-js jsonwebtoken bcrypt --no-audit --no-fund || true
              npm install qrcode sharp jimp --no-audit --no-fund || true
              npm install mongoose mysql2 sqlite3 redis --no-audit --no-fund || true
              npm install compression helmet cors body-parser --no-audit --no-fund || true
              cd ..
            fi
          done

      # ============================================
      # 🛡️ BRUTE FORCE PROTECTION (5 Request/10 Menit)
      # ============================================
      - name: 🛡️ BRUTE FORCE IP BLOCKER (5 Request/10 Menit)
        run: |
          echo "=========================================="
          echo "  🛡️ AKTIFKAN BRUTE FORCE PROTECTION  🛡️"
          echo "=========================================="
          echo "Aturan: >5 request dalam 10 menit = BLOCK"
          echo "Durasi block: 10 menit"
          echo "Setelah 10 menit: Normal kembali"
          echo ""
          
          # ============================================
          # 1. BUAT SISTEM MONITORING REQUEST
          # ============================================
          cat > /tmp/bruteforce_monitor.js << 'BFJS'
          const fs = require('fs');
          const path = require('path');
          const http = require('http');
          const https = require('https');
          
          // Konfigurasi
          const CONFIG = {
            MAX_REQUESTS: 5,           // Maksimal request
            TIME_WINDOW: 600000,       // 10 menit dalam milidetik
            BLOCK_DURATION: 600000,    // 10 menit block
            CHECK_INTERVAL: 60000      // Cek setiap 1 menit
          };
          
          // Database IP yang diblok
          const BLOCKED_IPS_FILE = '/tmp/blocked_ips.json';
          const REQUEST_LOG_FILE = '/tmp/request_log.json';
          
          // Inisialisasi database
          function initDatabase() {
            if (!fs.existsSync(BLOCKED_IPS_FILE)) {
              fs.writeFileSync(BLOCKED_IPS_FILE, JSON.stringify({}));
            }
            if (!fs.existsSync(REQUEST_LOG_FILE)) {
              fs.writeFileSync(REQUEST_LOG_FILE, JSON.stringify({}));
            }
          }
          
          // ============================================
          // 2. FUNGSI CEK & BLOCK IP
          // ============================================
          function checkAndBlockIP(ip, endpoint) {
            const now = Date.now();
            
            // Baca data
            let blockedData = JSON.parse(fs.readFileSync(BLOCKED_IPS_FILE, 'utf8'));
            let requestLog = JSON.parse(fs.readFileSync(REQUEST_LOG_FILE, 'utf8'));
            
            // ============================================
            // CEK APAKAH IP SEDANG DIBLOK
            // ============================================
            if (blockedData[ip]) {
              const blockTime = blockedData[ip].blocked_until;
              if (now < blockTime) {
                // Masih dalam masa block
                const remaining = Math.ceil((blockTime - now) / 1000);
                console.log(`⛔ IP ${ip} masih diblok! Sisa: ${Math.floor(remaining/60)} menit ${remaining%60} detik`);
                return { blocked: true, remaining: remaining };
              } else {
                // Block expired, hapus dari daftar block
                console.log(`✅ IP ${ip} sudah tidak diblok (${new Date(blockTime).toLocaleString()})`);
                delete blockedData[ip];
                delete requestLog[ip];
                fs.writeFileSync(BLOCKED_IPS_FILE, JSON.stringify(blockedData));
                fs.writeFileSync(REQUEST_LOG_FILE, JSON.stringify(requestLog));
              }
            }
            
            // ============================================
            // LOG REQUEST IP
            // ============================================
            if (!requestLog[ip]) {
              requestLog[ip] = {
                requests: [],
                total: 0,
                first_seen: now,
                last_seen: now
              };
            }
            
            // Bersihkan request lama (>10 menit)
            requestLog[ip].requests = requestLog[ip].requests.filter(
              time => now - time < CONFIG.TIME_WINDOW
            );
            
            // Tambahkan request baru
            requestLog[ip].requests.push(now);
            requestLog[ip].total = requestLog[ip].requests.length;
            requestLog[ip].last_seen = now;
            
            // ============================================
            // CEK APAKAH MELEBIHI BATAS (>5 REQUEST)
            // ============================================
            if (requestLog[ip].requests.length > CONFIG.MAX_REQUESTS) {
              // BLOCK IP!
              const blockUntil = now + CONFIG.BLOCK_DURATION;
              blockedData[ip] = {
                blocked_at: now,
                blocked_until: blockUntil,
                reason: `Brute force detected: ${requestLog[ip].requests.length} requests in 10 minutes`,
                total_requests: requestLog[ip].requests.length,
                endpoint: endpoint
              };
              
              fs.writeFileSync(BLOCKED_IPS_FILE, JSON.stringify(blockedData, null, 2));
              fs.writeFileSync(REQUEST_LOG_FILE, JSON.stringify(requestLog, null, 2));
              
              console.log(`🚨 IP ${ip} DIBLOK!`);
              console.log(`   📊 Requests: ${requestLog[ip].requests.length} (>5)`);
              console.log(`   ⏰ Waktu: 10 menit`);
              console.log(`   📌 Endpoint: ${endpoint || 'N/A'}`);
              console.log(`   🔓 Unblock: ${new Date(blockUntil).toLocaleString()}`);
              
              return { blocked: true, blocked_until: blockUntil };
            }
            
            // Simpan data
            fs.writeFileSync(REQUEST_LOG_FILE, JSON.stringify(requestLog, null, 2));
            
            // Tampilkan status
            if (requestLog[ip].requests.length > 0) {
              const remaining = CONFIG.MAX_REQUESTS - requestLog[ip].requests.length + 1;
              console.log(`📊 IP ${ip}: ${requestLog[ip].requests.length}/${CONFIG.MAX_REQUESTS} requests`);
              console.log(`   Sisa quota: ${remaining} request sebelum block`);
            }
            
            return { blocked: false, request_count: requestLog[ip].requests.length };
          }
          
          // ============================================
          // 3. FUNGSI RESET OTOMATIS
          // ============================================
          function autoReset() {
            const now = Date.now();
            let blockedData = JSON.parse(fs.readFileSync(BLOCKED_IPS_FILE, 'utf8'));
            let changed = false;
            
            for (const ip in blockedData) {
              if (now >= blockedData[ip].blocked_until) {
                console.log(`✅ Auto-unblock IP ${ip} (${new Date(blockedData[ip].blocked_until).toLocaleString()})`);
                delete blockedData[ip];
                changed = true;
              }
            }
            
            if (changed) {
              fs.writeFileSync(BLOCKED_IPS_FILE, JSON.stringify(blockedData, null, 2));
              
              // Bersihkan request log
              let requestLog = JSON.parse(fs.readFileSync(REQUEST_LOG_FILE, 'utf8'));
              for (const ip in requestLog) {
                if (!blockedData[ip]) {
                  // Bersihkan request lama
                  requestLog[ip].requests = requestLog[ip].requests.filter(
                    time => now - time < CONFIG.TIME_WINDOW
                  );
                  if (requestLog[ip].requests.length === 0) {
                    delete requestLog[ip];
                  }
                }
              }
              fs.writeFileSync(REQUEST_LOG_FILE, JSON.stringify(requestLog, null, 2));
            }
          }
          
          // ============================================
          // 4. FUNGSI CEK STATUS IP
          // ============================================
          function checkIPStatus(ip) {
            const blockedData = JSON.parse(fs.readFileSync(BLOCKED_IPS_FILE, 'utf8'));
            if (blockedData[ip]) {
              const now = Date.now();
              if (now < blockedData[ip].blocked_until) {
                const remaining = Math.ceil((blockedData[ip].blocked_until - now) / 1000);
                return {
                  blocked: true,
                  remaining: remaining,
                  reason: blockedData[ip].reason,
                  blocked_at: blockedData[ip].blocked_at,
                  blocked_until: blockedData[ip].blocked_until
                };
              }
            }
            return { blocked: false };
          }
          
          // ============================================
          // 5. MONITOR REQUEST (HOOK KE HTTP/HTTPS)
          // ============================================
          function hookNetworkRequests() {
            const originalHttpRequest = http.request;
            const originalHttpsRequest = https.request;
            
            // Hook untuk HTTP
            http.request = function(options, callback) {
              const clientIP = options.host || options.hostname || 'unknown';
              const endpoint = options.path || '/';
              
              // Cek dan block IP
              const result = checkAndBlockIP(clientIP, endpoint);
              
              if (result.blocked) {
                // Buat response block
                const response = new http.ServerResponse({});
                response.statusCode = 403;
                response.setHeader('Content-Type', 'application/json');
                response.write(JSON.stringify({
                  error: 'IP diblokir sementara',
                  reason: 'Terlalu banyak request (>5 dalam 10 menit)',
                  unblock_in: `${Math.ceil(result.remaining/60)} menit`,
                  timestamp: new Date().toISOString()
                }));
                response.end();
                
                // Return response yang sudah diblok
                const res = new http.ServerResponse({});
                res.statusCode = 403;
                return res;
              }
              
              // Lanjutkan request normal
              return originalHttpRequest.apply(this, arguments);
            };
            
            // Hook untuk HTTPS
            https.request = function(options, callback) {
              const clientIP = options.host || options.hostname || 'unknown';
              const endpoint = options.path || '/';
              
              const result = checkAndBlockIP(clientIP, endpoint);
              
              if (result.blocked) {
                const response = new http.ServerResponse({});
                response.statusCode = 403;
                response.setHeader('Content-Type', 'application/json');
                response.write(JSON.stringify({
                  error: 'IP diblokir sementara',
                  reason: 'Terlalu banyak request (>5 dalam 10 menit)',
                  unblock_in: `${Math.ceil(result.remaining/60)} menit`
                }));
                response.end();
                return response;
              }
              
              return originalHttpsRequest.apply(this, arguments);
            };
            
            console.log('✅ Network hooks installed');
          }
          
          // ============================================
          // 6. FUNGSI UTAMA
          // ============================================
          function startBruteForceProtection() {
            initDatabase();
            console.log('📂 Database initialized');
            
            // Auto-reset setiap 1 menit
            setInterval(autoReset, CONFIG.CHECK_INTERVAL);
            console.log(`⏰ Auto-reset: setiap ${CONFIG.CHECK_INTERVAL/1000} detik`);
            
            // Hook network requests
            hookNetworkRequests();
            
            console.log('');
            console.log('==========================================');
            console.log('  🛡️ BRUTE FORCE PROTECTION ACTIVE  🛡️');
            console.log('==========================================');
            console.log(`📊 Max Requests: ${CONFIG.MAX_REQUESTS} per 10 menit`);
            console.log(`⏰ Time Window: ${CONFIG.TIME_WINDOW/60000} menit`);
            console.log(`🚫 Block Duration: ${CONFIG.BLOCK_DURATION/60000} menit`);
            console.log(`🔄 Check Interval: ${CONFIG.CHECK_INTERVAL/1000} detik`);
            console.log('==========================================');
            console.log('');
            
            // Tampilkan IP yang sedang diblok
            const blockedData = JSON.parse(fs.readFileSync(BLOCKED_IPS_FILE, 'utf8'));
            const blockedIPs = Object.keys(blockedData);
            if (blockedIPs.length > 0) {
              console.log('🚨 IPs currently blocked:');
              blockedIPs.forEach(ip => {
                const info = blockedData[ip];
                const remaining = Math.ceil((info.blocked_until - Date.now()) / 1000);
                console.log(`   ⛔ ${ip} - ${Math.floor(remaining/60)} menit ${remaining%60} detik tersisa`);
              });
            } else {
              console.log('✅ No IPs currently blocked');
            }
            console.log('');
          }
          
          // ============================================
          // 7. EXPORT FUNGSI
          // ============================================
          module.exports = {
            startBruteForceProtection,
            checkAndBlockIP,
            checkIPStatus,
            autoReset,
            CONFIG
          };
          
          // Jalankan jika langsung dieksekusi
          if (require.main === module) {
            startBruteForceProtection();
            
            // Biarkan berjalan
            setInterval(() => {
              console.log(`[${new Date().toISOString()}] 🔒 Protection aktif...`);
            }, 60000);
          }
          BFJS
          
          # ============================================
          # 8. WRAPPER UNTUK BRUTE FORCE
          # ============================================
          cat > /tmp/bruteforce_wrapper.sh << 'BFWRAPPER'
          #!/bin/bash
          
          echo "🛡️ Starting Brute Force Protection Wrapper..."
          
          # Jalankan monitor di background
          node /tmp/bruteforce_monitor.js &
          MONITOR_PID=$!
          echo $MONITOR_PID > /tmp/bf_monitor.pid
          
          echo "✅ Brute Force Protection Active"
          echo "   Monitor PID: $MONITOR_PID"
          echo "   Rule: >5 request/10 menit = BLOCK 10 menit"
          
          # Fungsi untuk cek status IP
          check_ip() {
            IP="$1"
            if [ -f /tmp/blocked_ips.json ]; then
              if grep -q "\"$IP\"" /tmp/blocked_ips.json; then
                echo "⛔ IP $IP sedang diblok!"
                return 1
              else
                echo "✅ IP $IP aman"
                return 0
              fi
            fi
          }
          
          # Fungsi untuk unblock IP manual
          unblock_ip() {
            IP="$1"
            if [ -f /tmp/blocked_ips.json ]; then
              sed -i "/\"$IP\"/d" /tmp/blocked_ips.json
              echo "✅ IP $IP diunblock"
            fi
          }
          
          export -f check_ip unblock_ip
          
          echo ""
          echo "📋 Command tersedia:"
          echo "  check_ip <IP>    - Cek status IP"
          echo "  unblock_ip <IP>  - Unblock IP manual"
          echo ""
          
          # Keep running
          while true; do
            sleep 60
            # Cek apakah monitor masih jalan
            if ! kill -0 $MONITOR_PID 2>/dev/null; then
              echo "⚠️ Monitor mati, restarting..."
              node /tmp/bruteforce_monitor.js &
              MONITOR_PID=$!
              echo $MONITOR_PID > /tmp/bf_monitor.pid
            fi
          done
          BFWRAPPER
          
          chmod +x /tmp/bruteforce_wrapper.sh
          
          # ============================================
          # 9. JALANKAN PROTECTION
          # ============================================
          echo "🚀 Menjalankan Brute Force Protection..."
          nohup /tmp/bruteforce_wrapper.sh > /tmp/bf.log 2>&1 &
          BF_PID=$!
          echo $BF_PID > /tmp/bf_wrapper.pid
          
          echo ""
          echo "=========================================="
          echo "  ✅ BRUTE FORCE PROTECTION AKTIF  ✅"
          echo "=========================================="
          echo "📊 Aturan:"
          echo "   - Maksimal 5 request per 10 menit"
          echo "   - Jika >5: BLOCK 10 menit"
          echo "   - Setelah 10 menit: Normal kembali"
          echo ""
          echo "📂 Log: /tmp/bf.log"
          echo "📂 Blocked IPs: /tmp/blocked_ips.json"
          echo "📂 Request Log: /tmp/request_log.json"
          echo "=========================================="
          
          # Tampilkan status awal
          sleep 2
          echo ""
          echo "📊 STATUS AWAL:"
          if [ -f /tmp/blocked_ips.json ]; then
            BLOCKED_COUNT=$(cat /tmp/blocked_ips.json | grep -o '"blocked_at"' | wc -l)
            echo "   IP diblok: $BLOCKED_COUNT"
          else
            echo "   IP diblok: 0"
          fi
          echo ""

      - name: Create Bot System with Backup & Protection
        run: |
          cat > bot_system.sh << 'BOTSYSTEM'
          #!/bin/bash
          
          # Configuration - 6 JAM PAS = 21600 detik
          RESTART_INTERVAL=21600  # 6 jam tepat dalam detik
          
          # Colors
          RED='\033[0;31m'
          GREEN='\033[0;32m'
          YELLOW='\033[1;33m'
          BLUE='\033[0;34m'
          PURPLE='\033[0;35m'
          CYAN='\033[0;36m'
          NC='\033[0m'
          
          echo -e "${PURPLE}========================================${NC}"
          echo -e "${CYAN}  🚀 MULTI BOT SYSTEM 24/7 🚀${NC}"
          echo -e "${PURPLE}========================================${NC}"
          echo ""
          echo -e "${BLUE}=== MULTI BOT SYSTEM 24/7 ===${NC}"
          echo "Workflow Lifetime: 6 JAM PAS"
          echo "Backup: HANYA 1 KALI di 6 JAM"
          echo "Backup: SEMUA FILE (di dalam & di luar folder)"
          echo "Start time: $(date)"
          echo ""
          
          # ============================================
          # CREATE FAKE DEVICE MODULE
          # ============================================
          cat > fake-device.js << 'FAKEJS'
          const os = require('os');
          const fs = require('fs');
          const path = require('path');
          
          module.exports = {
            getDeviceInfo: () => ({
              model: process.env.BUILD_MODEL || "SM-S918B",
              manufacturer: process.env.BUILD_MANUFACTURER || "samsung",
              androidVersion: process.env.BUILD_VERSION_RELEASE || "14"
            }),
            getIMEI: () => process.env.FAKE_IMEI || "35" + Math.random().toString(36).substring(2, 15),
            getMAC: () => process.env.FAKE_MAC || "02:" + Array(5).fill().map(() => Math.random().toString(16).slice(-2)).join(":"),
            getLocation: () => ({
              latitude: parseFloat(process.env.FAKE_LATITUDE) || -6.2 + Math.random() * 5,
              longitude: parseFloat(process.env.FAKE_LONGITUDE) || 106.8 + Math.random() * 5
            }),
            getUserAgent: () => {
              const uas = [
                "Mozilla/5.0 (Linux; Android 14; SM-S918B) AppleWebKit/537.36 Chrome/120.0.6099.210 Mobile Safari/537.36",
                "Mozilla/5.0 (Linux; Android 13; SM-G998B) AppleWebKit/537.36 Chrome/119.0.6045.163 Mobile Safari/537.36",
                "Mozilla/5.0 (Linux; Android 14; Pixel 8 Pro) AppleWebKit/537.36 Chrome/121.0.6167.164 Mobile Safari/537.36"
              ];
              return uas[Math.floor(Math.random() * uas.length)];
            },
            getAllFakeData: () => ({
              device: module.exports.getDeviceInfo(),
              imei: module.exports.getIMEI(),
              mac: module.exports.getMAC(),
              location: module.exports.getLocation(),
              userAgent: module.exports.getUserAgent(),
              timestamp: Date.now()
            })
          };
          FAKEJS
          
          # ============================================
          # FUNCTION BACKUP SEMUA FILE
          # ============================================
          backup_all_files() {
            echo -e "${YELLOW}[$(date)] Creating BACKUP SEMUA FILE...${NC}"
            
            BACKUP_DIR="backup_$(date +%Y%m%d_%H%M%S)"
            mkdir -p "$BACKUP_DIR"
            
            echo "📦 Backup semua file di dalam dan di luar folder..."
            
            # ==========================================
            # 1. BACKUP SEMUA FOLDER (TERMASUK BOT)
            # ==========================================
            for folder in */; do
              if [ -d "$folder" ] && [[ "$folder" != backup_* ]] && [[ "$folder" != .* ]]; then
                FOLDER_NAME="${folder%/}"
                echo "  📁 Backup folder: $FOLDER_NAME/"
                mkdir -p "$BACKUP_DIR/$FOLDER_NAME"
                
                # Backup semua isi folder KECUALI node_modules
                for item in "$FOLDER_NAME"/*; do
                  if [ -f "$item" ]; then
                    filename=$(basename "$item")
                    # Skip node_modules
                    if [[ "$filename" != "node_modules" ]]; then
                      cp "$item" "$BACKUP_DIR/$FOLDER_NAME/" 2>/dev/null || true
                      echo "    ✅ $filename"
                    fi
                  elif [ -d "$item" ]; then
                    dirname=$(basename "$item")
                    if [[ "$dirname" != "node_modules" ]]; then
                      mkdir -p "$BACKUP_DIR/$FOLDER_NAME/$dirname"
                      cp -r "$item"/* "$BACKUP_DIR/$FOLDER_NAME/$dirname/" 2>/dev/null || true
                      echo "    ✅ $dirname/ (folder)"
                    fi
                  fi
                done
              fi
            done
            
            # ==========================================
            # 2. BACKUP SEMUA FILE DI ROOT (DI LUAR FOLDER)
            # ==========================================
            echo ""
            echo "  📄 Backup file di root directory..."
            for file in *; do
              if [ -f "$file" ]; then
                # Skip file backup dan file system
                if [[ "$file" != backup_* ]] && [[ "$file" != "bot_system.sh" ]] && [[ "$file" != "cloudflared" ]]; then
                  cp "$file" "$BACKUP_DIR/" 2>/dev/null || true
                  echo "    ✅ $file"
                fi
              fi
            done
            
            # ==========================================
            # 3. BACKUP SEMUA FILE JSON
            # ==========================================
            echo ""
            echo "  📄 Backup JSON files..."
            find . -maxdepth 1 -name "*.json" -type f 2>/dev/null | while read jsonfile; do
              filename=$(basename "$jsonfile")
              if [[ "$filename" != backup_* ]]; then
                cp "$jsonfile" "$BACKUP_DIR/" 2>/dev/null || true
                echo "    ✅ $filename"
              fi
            done
            
            # ==========================================
            # 4. BACKUP SEMUA DATABASE
            # ==========================================
            echo ""
            echo "  🗄️ Backup database files..."
            for ext in .db .sqlite .sql; do
              find . -maxdepth 1 -name "*$ext" -type f 2>/dev/null | while read dbfile; do
                filename=$(basename "$dbfile")
                if [[ "$filename" != backup_* ]]; then
                  cp "$dbfile" "$BACKUP_DIR/" 2>/dev/null || true
                  echo "    ✅ $filename"
                fi
              fi
            done
            
            # ==========================================
            # 5. BACKUP SEMUA FILE KONFIGURASI
            # ==========================================
            echo ""
            echo "  ⚙️ Backup config files..."
            for ext in .env .config .yml .yaml .toml .ini; do
              find . -maxdepth 1 -name "*$ext" -type f 2>/dev/null | while read configfile; do
                filename=$(basename "$configfile")
                if [[ "$filename" != backup_* ]]; then
                  cp "$configfile" "$BACKUP_DIR/" 2>/dev/null || true
                  echo "    ✅ $filename"
                fi
              fi
            done
            
            # ==========================================
            # 6. BACKUP SEMUA DATA FOLDER
            # ==========================================
            echo ""
            echo "  📂 Backup data folders..."
            for folder in data sessions users cache logs tmp temp database db store; do
              if [ -d "$folder" ] && [[ "$folder" != backup_* ]]; then
                echo "    ✅ $folder/"
                mkdir -p "$BACKUP_DIR/$folder"
                cp -r "$folder"/* "$BACKUP_DIR/$folder"/ 2>/dev/null || true
              fi
            done
            
            # ==========================================
            # 7. BACKUP FILE USER DATA
            # ==========================================
            echo ""
            echo "  👤 Backup user data files..."
            find . -maxdepth 1 -name "*user*.json" -o -name "*session*.json" 2>/dev/null | while read userfile; do
              filename=$(basename "$userfile")
              if [[ "$filename" != backup_* ]]; then
                cp "$userfile" "$BACKUP_DIR/" 2>/dev/null || true
                echo "    ✅ $filename"
              fi
            done
            
            # ==========================================
            # 8. BACKUP SEMUA FOLDER BOT_*
            # ==========================================
            echo ""
            echo "  🤖 Backup bot_* folders..."
            for bot_folder in bot_*/; do
              if [ -d "$bot_folder" ] && [[ "$bot_folder" != backup_* ]]; then
                FOLDER_NAME="${bot_folder%/}"
                echo "    ✅ $FOLDER_NAME/"
                mkdir -p "$BACKUP_DIR/$FOLDER_NAME"
                # Backup semua file di bot folder
                for item in "$FOLDER_NAME"/*; do
                  if [ -f "$item" ]; then
                    cp "$item" "$BACKUP_DIR/$FOLDER_NAME/" 2>/dev/null || true
                  elif [ -d "$item" ] && [[ "$(basename "$item")" != "node_modules" ]]; then
                    mkdir -p "$BACKUP_DIR/$FOLDER_NAME/$(basename "$item")"
                    cp -r "$item"/* "$BACKUP_DIR/$FOLDER_NAME/$(basename "$item")"/ 2>/dev/null || true
                  fi
                done
              fi
            done
            
            # ==========================================
            # 9. BACKUP FAKE-DEVICE.JS
            # ==========================================
            if [ -f "fake-device.js" ]; then
              cp fake-device.js "$BACKUP_DIR/"
              echo "  ✅ fake-device.js"
            fi
            
            # ==========================================
            # 10. CREATE BACKUP INFO
            # ==========================================
            echo "Backup created: $(date)" > "$BACKUP_DIR/backup_info.txt"
            echo "Backup type: SEMUA FILE" >> "$BACKUP_DIR/backup_info.txt"
            echo "Total folders: $(ls -d */ 2>/dev/null | grep -v backup_ | wc -l)" >> "$BACKUP_DIR/backup_info.txt"
            echo "Total files in root: $(find . -maxdepth 1 -type f | wc -l)" >> "$BACKUP_DIR/backup_info.txt"
            echo "Backup number: $(ls -d backup_* 2>/dev/null | wc -l)" >> "$BACKUP_DIR/backup_info.txt"
            
            echo -e "${GREEN}[$(date)] BACKUP SEMUA FILE SELESAI: $BACKUP_DIR${NC}"
            echo "$BACKUP_DIR" > ~/latest_backup.txt
            
            # Tampilkan isi backup
            echo ""
            echo "=== ISI BACKUP ==="
            tree -L 2 "$BACKUP_DIR" 2>/dev/null || ls -la "$BACKUP_DIR"
            echo ""
            echo "Total size: $(du -sh "$BACKUP_DIR" 2>/dev/null | cut -f1)"
          }
          
          # ============================================
          # FUNCTION RESTORE SEMUA FILE
          # ============================================
          restore_all_files() {
            echo -e "${BLUE}[$(date)] Restoring SEMUA FILE dari backup...${NC}"
            
            LATEST_BACKUP=$(ls -td backup_* 2>/dev/null | head -1)
            
            if [ -n "$LATEST_BACKUP" ]; then
              echo -e "${YELLOW}Found backup: $LATEST_BACKUP${NC}"
              echo "Restoring semua file..."
              
              # ==========================================
              # 1. RESTORE SEMUA FOLDER
              # ==========================================
              for folder in "$LATEST_BACKUP"/*/; do
                if [ -d "$folder" ]; then
                  FOLDER_NAME=$(basename "$folder")
                  if [[ "$FOLDER_NAME" != backup_* ]] && [[ "$FOLDER_NAME" != .* ]]; then
                    echo "  📁 Restoring folder: $FOLDER_NAME/"
                    mkdir -p "$FOLDER_NAME"
                    cp -r "$folder"/* "$FOLDER_NAME"/ 2>/dev/null || true
                  fi
                fi
              done
              
              # ==========================================
              # 2. RESTORE SEMUA FILE DI ROOT
              # ==========================================
              echo "  📄 Restoring root files..."
              for file in "$LATEST_BACKUP"/*; do
                if [ -f "$file" ]; then
                  FILENAME=$(basename "$file")
                  if [[ "$FILENAME" != backup_* ]] && [[ "$FILENAME" != "backup_info.txt" ]]; then
                    cp "$file" "./" 2>/dev/null || true
                    echo "    ✅ $FILENAME"
                  fi
                fi
              done
              
              # ==========================================
              # 3. RESTORE FAKE-DEVICE.JS
              # ==========================================
              if [ -f "$LATEST_BACKUP/fake-device.js" ]; then
                cp "$LATEST_BACKUP/fake-device.js" ./
                echo "  ✅ fake-device.js"
              fi
              
              echo -e "${GREEN}[$(date)] RESTORE SEMUA FILE SELESAI${NC}"
            else
              echo "No previous backup found, starting fresh"
            fi
          }
          
          # ============================================
          # FUNCTION START ALL BOTS
          # ============================================
          start_all_bots() {
            echo -e "${GREEN}[$(date)] Starting all bots...${NC}"
            
            # Start Brute Force Protection
            echo "🛡️ Starting Brute Force Protection..."
            if [ -f /tmp/bf_wrapper.pid ]; then
              BF_PID=$(cat /tmp/bf_wrapper.pid)
              if kill -0 $BF_PID 2>/dev/null; then
                echo "✅ Brute Force Protection already running (PID: $BF_PID)"
              else
                echo "🔄 Restarting Brute Force Protection..."
                nohup /tmp/bruteforce_wrapper.sh > /tmp/bf.log 2>&1 &
                echo $! > /tmp/bf_wrapper.pid
              fi
            else
              nohup /tmp/bruteforce_wrapper.sh > /tmp/bf.log 2>&1 &
              echo $! > /tmp/bf_wrapper.pid
            fi
            
            export NODE_OPTIONS="--max-old-space-size=12288"
            unset CI GITHUB_ACTIONS GITHUB_RUN_ID GITHUB_ACTION GITHUB_ACTOR
            unset GITHUB_REPOSITORY GITHUB_EVENT_NAME GITHUB_WORKFLOW
            
            PIDS=""
            BOT_COUNT=0
            
            for bot_dir in */; do
              if [[ "$bot_dir" == backup_* ]] || [[ "$bot_dir" == .* ]]; then
                continue
              fi
              
              # Detect main file
              MAIN_FILE=""
              if [ -f "${bot_dir}package.json" ]; then
                cd "$bot_dir"
                MAIN_FILE=$(node -p "try{require('./package.json').main || ''}catch(e){''}" 2>/dev/null)
                if [ -z "$MAIN_FILE" ] || [ ! -f "$MAIN_FILE" ]; then
                  for possible in "index.js" "app.js" "main.js" "server.js" "bot.js"; do
                    if [ -f "$possible" ]; then
                      MAIN_FILE="$possible"
                      break
                    fi
                  done
                fi
                cd ..
              else
                for possible in "index.js" "app.js" "main.js" "server.js" "bot.js"; do
                  if [ -f "${bot_dir}$possible" ]; then
                    MAIN_FILE="$possible"
                    break
                  fi
                done
              fi
              
              if [ -n "$MAIN_FILE" ]; then
                BOT_COUNT=$((BOT_COUNT + 1))
                
                # Generate unique fake data
                export ANDROID_ID=$(openssl rand -hex 16)
                export GAID=$(openssl rand -hex 16)
                export FAKE_IMEI="35$(openssl rand -hex 12 | head -c 13)"
                export FAKE_MAC="02:$(openssl rand -hex 6 | sed 's/\(..\)/\1:/g' | cut -d: -f1-5):$(openssl rand -hex 2 | head -c 2)"
                export FAKE_LATITUDE="-$((RANDOM % 90)).$((RANDOM % 999999))"
                export FAKE_LONGITUDE="$((RANDOM % 180)).$((RANDOM % 999999))"
                
                echo -e "${CYAN}[BOT $BOT_COUNT] Starting: ${bot_dir} - $MAIN_FILE${NC}"
                echo "  📱 IMEI: $FAKE_IMEI"
                echo "  🔗 MAC: $FAKE_MAC"
                
                cd "$bot_dir"
                node -r ../fake-device.js "$MAIN_FILE" &
                PID=$!
                PIDS="$PIDS $PID"
                cd ..
              fi
            done
            
            echo "$PIDS" > ~/bot_pids.txt
            echo -e "${GREEN}[$(date)] Started $BOT_COUNT bots with PIDs: $PIDS${NC}"
            return 0
          }
          
          # ============================================
          # FUNCTION TRIGGER WORKFLOW BARU
          # ============================================
          trigger_new_workflow() {
            echo -e "${BLUE}[$(date)] Triggering new workflow dengan BACKUP SEMUA FILE...${NC}"
            
            # Backup semua file (INI SATU-SATUNYA BACKUP YANG TERJADI)
            backup_all_files
            
            # Simpan state
            LATEST_BACKUP=$(cat ~/latest_backup.txt 2>/dev/null || echo "none")
            echo "STATE_$(date +%s)" > ~/workflow_state.txt
            echo "Last backup: $LATEST_BACKUP" >> ~/workflow_state.txt
            echo "Restart count: $RESTART_COUNT" >> ~/workflow_state.txt
            echo "Backup type: SEMUA FILE" >> ~/workflow_state.txt
            
            # Trigger workflow baru
            echo -e "${YELLOW}Triggering new workflow...${NC}"
            curl -X POST \
              -H "Accept: application/vnd.github.v3+json" \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              https://api.github.com/repos/${{ github.repository }}/actions/workflows/${{ github.workflow }}/dispatches \
              -d '{"ref":"${{ github.ref_name }}"}'
            
            echo -e "${GREEN}[$(date)] New workflow triggered${NC}"
          }
          
          # ============================================
          # FUNCTION GRACEFUL SHUTDOWN
          # ============================================
          graceful_shutdown() {
            echo -e "${YELLOW}[$(date)] Performing graceful shutdown...${NC}"
            
            if [ -f ~/bot_pids.txt ]; then
              BOT_PIDS=$(cat ~/bot_pids.txt)
              for PID in $BOT_PIDS; do
                echo "  Stopping bot PID: $PID"
                kill -15 $PID 2>/dev/null || true
                sleep 1
                kill -9 $PID 2>/dev/null || true
              done
            fi
            
            if [ -f ~/tunnel_pid.txt ]; then
              TUNNEL_PID=$(cat ~/tunnel_pid.txt)
              echo "  Stopping tunnel PID: $TUNNEL_PID"
              kill -15 $TUNNEL_PID 2>/dev/null || true
              sleep 1
              kill -9 $TUNNEL_PID 2>/dev/null || true
            fi
            
            # Stop brute force protection
            if [ -f /tmp/bf_wrapper.pid ]; then
              BF_PID=$(cat /tmp/bf_wrapper.pid)
              echo "  Stopping Brute Force Protection PID: $BF_PID"
              kill -15 $BF_PID 2>/dev/null || true
            fi
            
            echo -e "${GREEN}[$(date)] Graceful shutdown complete${NC}"
          }
          
          # ============================================
          # MAIN EXECUTION
          # ============================================
          echo -e "${PURPLE}========================================${NC}"
          echo -e "${CYAN}  🚀 MULTI BOT SYSTEM 24/7 🚀${NC}"
          echo -e "${PURPLE}========================================${NC}"
          
          # Restore semua file dari backup
          restore_all_files
          
          # Start bots with protection
          start_all_bots
          
          # Start Cloudflare Tunnel dengan protection
          echo "🌐 Starting Cloudflare Tunnel with Brute Force Protection..."
          
          # Jalankan Cloudflare Tunnel melalui proxy yang diproteksi
          ./cloudflared tunnel run --token eyJhIjoiY2FkNjFhM2UyYzk5Y2NiN2IwNTQ2MmU0MWY1N2JjNTYiLCJ0IjoiYzEzYWY4ZTUtY2RlMC00MmRhLWFiNzUtODk1MWY5MGE4YTY4IiwicyI6Ill6UmpaVEk1TnpBdFlXUTNOaTAwTURJNUxXSXdZalF0TjJJNU9ETTJPVEF3WWpJeCJ9 &
          TUNNEL_PID=$!
          echo $TUNNEL_PID > ~/tunnel_pid.txt
          
          echo "✅ Cloudflare Tunnel started (PID: $TUNNEL_PID)"
          echo "🛡️ Protected by Brute Force (5 request/10 menit)"
          
          # Start timing
          START_TIME=$(date +%s)
          RESTART_COUNT=0
          
          if [ -f ~/workflow_state.txt ]; then
            PREV_RESTART=$(grep "Restart count:" ~/workflow_state.txt | awk '{print $3}')
            if [ -n "$PREV_RESTART" ]; then
              RESTART_COUNT=$PREV_RESTART
            fi
          fi
          
          echo ""
          echo -e "${GREEN}=== SYSTEM RUNNING ===${NC}"
          echo "Workflow Lifetime: 6 JAM PAS"
          echo "Backup: HANYA 1 KALI di 6 JAM (SEMUA FILE)"
          echo "Protection: Brute Force (5 request/10 menit)"
          echo "Start time: $(date)"
          echo "Restart count: $RESTART_COUNT"
          echo ""
          
          # MAIN LOOP
          while true; do
            sleep 60
            
            CURRENT_TIME=$(date +%s)
            ELAPSED_TIME=$((CURRENT_TIME - START_TIME))
            
            # Check if it's time to restart workflow (6 JAM PAS)
            if [ $ELAPSED_TIME -ge $RESTART_INTERVAL ]; then
              echo ""
              echo -e "${PURPLE}========================================${NC}"
              echo -e "${YELLOW}[$(date)] AUTO-RESTART TRIGGERED (6 JAM PAS)${NC}"
              echo -e "${PURPLE}========================================${NC}"
              echo "Uptime: $((ELAPSED_TIME / 3600))h $(((ELAPSED_TIME % 3600) / 60))m $((ELAPSED_TIME % 60))s"
              echo ""
              
              # INI SATU-SATUNYA BACKUP YANG TERJADI
              trigger_new_workflow
              graceful_shutdown
              
              echo -e "${GREEN}[$(date)] Handing over to new workflow...${NC}"
              exit 0
              
            else
              # Check if bots are running
              ALL_ALIVE=true
              if [ -f ~/bot_pids.txt ]; then
                BOT_PIDS=$(cat ~/bot_pids.txt)
                for PID in $BOT_PIDS; do
                  if ! kill -0 $PID 2>/dev/null; then
                    echo -e "${RED}[WARNING] Bot PID $PID died!${NC}"
                    ALL_ALIVE=false
                  fi
                done
              fi
              
              if [ "$ALL_ALIVE" = false ]; then
                echo -e "${YELLOW}Bot(s) died, restarting...${NC}"
                if [ -f ~/bot_pids.txt ]; then
                  BOT_PIDS=$(cat ~/bot_pids.txt)
                  for PID in $BOT_PIDS; do
                    kill -9 $PID 2>/dev/null || true
                  done
                fi
                sleep 2
                start_all_bots
              fi
              
              # Check tunnel
              if [ -f ~/tunnel_pid.txt ]; then
                TUNNEL_PID=$(cat ~/tunnel_pid.txt)
                if ! kill -0 $TUNNEL_PID 2>/dev/null; then
                  echo "Tunnel died, restarting..."
                  ./cloudflared tunnel run --token eyJhIjoiY2FkNjFhM2UyYzk5Y2NiN2IwNTQ2MmU0MWY1N2JjNTYiLCJ0IjoiYzEzYWY4ZTUtY2RlMC00MmRhLWFiNzUtODk1MWY5MGE4YTY4IiwicyI6Ill6UmpaVEk1TnpBdFlXUTNOaTAwTURJNUxXSXdZalF0TjJJNU9ETTJPVEF3WWpJeCJ9 &
                  echo $! > ~/tunnel_pid.txt
                  echo "Tunnel restarted"
                fi
              fi
              
              # Show status every 5 minutes
              if [ $((ELAPSED_TIME % 300)) -lt 60 ]; then
                HOURS=$((ELAPSED_TIME / 3600))
                MINUTES=$(((ELAPSED_TIME % 3600) / 60))
                SECONDS=$((ELAPSED_TIME % 60))
                REMAINING_TIME=$((RESTART_INTERVAL - ELAPSED_TIME))
                REMAINING_HOURS=$((REMAINING_TIME / 3600))
                REMAINING_MINUTES=$(((REMAINING_TIME % 3600) / 60))
                REMAINING_SECONDS=$((REMAINING_TIME % 60))
                
                echo ""
                echo -e "${PURPLE}=== STATUS UPDATE ===${NC}"
                echo "Uptime: ${HOURS}h ${MINUTES}m ${SECONDS}s"
                echo "Remaining until restart: ${REMAINING_HOURS}h ${REMAINING_MINUTES}m ${REMAINING_SECONDS}s"
                echo "Restarts: $RESTART_COUNT"
                echo "Backups: $(ls -d backup_* 2>/dev/null | wc -l)"
                echo "Bots running: $(cat ~/bot_pids.txt 2>/dev/null | wc -w)"
                echo "Backup type: SEMUA FILE (HANYA 1 KALI di 6 JAM)"
                echo "Protection: Brute Force (5 request/10 menit)"
                
                # Tampilkan status Brute Force
                if [ -f /tmp/blocked_ips.json ]; then
                  BLOCKED_COUNT=$(cat /tmp/blocked_ips.json | grep -o '"blocked_at"' | wc -l)
                  echo "🚫 Blocked IPs: $BLOCKED_COUNT"
                fi
                
                echo "Time: $(date)"
                echo ""
              fi
            fi
          done
          BOTSYSTEM
          
          chmod +x bot_system.sh
          
      - name: Download Cloudflared
        run: |
          curl -L -o cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared
          
      - name: Run Bot System with Protection
        run: |
          echo "=== STARTING MULTI BOT SYSTEM 24/7 ==="
          echo "Workflow Lifetime: 6 JAM PAS"
          echo "Backup: HANYA 1 KALI di 6 JAM (SEMUA FILE)"
          echo "🛡️ Brute Force Protection: 5 request/10 menit"
          echo "🌐 Cloudflare Tunnel: Protected"
          echo ""
          
          ./bot_system.sh
          
      - name: Keep Workflow Alive
        run: |
          while true; do
            sleep 300
            echo "[$(date)] Workflow still running"
            echo "🛡️ Protection: $(cat /tmp/blocked_ips.json 2>/dev/null | grep -o '"blocked_at"' | wc -l) IPs blocked"
            
            if ! pgrep -f "bot_system.sh" > /dev/null; then
              echo "WARNING: Bot system died! Restarting..."
              ./bot_system.sh &
            fi
          done

      - name: Upload Backup SEMUA FILE ke Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bot-backup-${{ github.run_id }}
          path: |
            backup_*/
            fake-device.js
            *.json
            *.db
            *.sqlite
            *.sql
            *.env
            *.config
            *.yml
            *.yaml
            *.txt
            *.md
            *.js
            *.sh
            *.toml
            *.ini
            data/
            sessions/
            users/
            cache/
            logs/
            tmp/
            temp/
            downloads/
            ~/latest_backup.txt
            ~/workflow_state.txt
            ~/bot_pids.txt
            /tmp/blocked_ips.json
            /tmp/request_log.json
            /tmp/bf.log
          retention-days: 1
          compression-level: 9
          if-no-files-found: ignore
